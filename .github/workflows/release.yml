name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions: {}

env:
  IMAGE: ghcr.io/bcrisp4/bscribe

jobs:
  # Build each architecture on its OWN native runner and push by digest (no tag).
  # arm64 runs on GitHub's native ubuntu-24.04-arm rather than QEMU: the image
  # bakes LibreOffice + ImageMagick, whose apt post-install work is pathological
  # under emulation (minutes of emulated CPU). Native metal removes that entirely.
  # The `merge` job stitches the two digests into one multi-arch tag afterwards.
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      # A job permissions block resets every unlisted scope to none, so both
      # scopes must be named explicitly: checkout needs `contents: read`, the
      # push-by-digest to GHCR needs `packages: write`.
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # `linux/amd64` -> `linux-amd64`, for a filesystem-safe artifact name.
      - name: Derive version and platform slug
        env:
          REF_NAME: ${{ github.ref_name }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "VERSION=${REF_NAME#v}" >> "${GITHUB_ENV}"
          echo "PLATFORM_SLUG=${PLATFORM//\//-}" >> "${GITHUB_ENV}"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # push-by-digest: publishes org/name@sha256:… with no tag. The tag is
      # applied once, over both digests, in the merge job. name-canonical keeps
      # the digest attached to the final image name for provenance/SBOM.
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_BSCRIBE=${{ env.VERSION }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          sbom: true
          provenance: mode=max

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the two per-arch digests into one multi-arch manifest, apply the
  # real tags, and attest the resulting manifest-list digest.
  merge:
    name: merge manifest + attest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write      # push the manifest to GHCR
      id-token: write      # OIDC for keyless attestation
      attestations: write  # write attestations to GitHub
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          # latest=auto: the `latest` tag is added only for non-prerelease semver
          # tags, and {{major}}.{{minor}} falls back to {{version}} on prereleases
          # (no floating tag) — same gating the single-job workflow relied on.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          METADATA: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${METADATA}") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Capture manifest-list digest
        id: digest
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          digest="$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  # Cut the GitHub Release from the curated CHANGELOG section. Split from the
  # image jobs so a registry hiccup never blocks the release notes and vice versa.
  release:
    name: github release
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      # Extract this tag's section from CHANGELOG.md as the release notes, so the
      # curated changelog is the single source of truth. Fail fast if the section
      # is missing rather than publishing empty notes (see docs/changelog.md).
      - name: Extract release notes from CHANGELOG.md
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          notes="${RUNNER_TEMP}/notes.md"
          # Stop on the next section header OR a link-reference DEFINITION
          # (e.g. "[Unreleased]: https://...") so a released section that is
          # last in the file doesn't drag its link-def lines into the notes.
          # The link-def stop requires the "]:" shape so ordinary note text
          # that merely starts with "[" (e.g. "[BREAKING] ...") is not treated
          # as a boundary and does not truncate the release body.
          awk -v hdr="## [${version}]" '
            index($0, hdr) == 1              { grab = 1; next }
            grab && /^(## \[|\[[^]]*\]:)/     { grab = 0 }
            grab                             { print }
          ' CHANGELOG.md > "${notes}"
          if ! grep -q '[^[:space:]]' "${notes}"; then
            echo "::error::No CHANGELOG.md section found for ${version}. Add '## [${version}] - <date>' before tagging (see docs/changelog.md)."
            exit 1
          fi
          echo "NOTES_FILE=${notes}" >> "${GITHUB_ENV}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: ${{ env.NOTES_FILE }}
          prerelease: ${{ contains(github.ref_name, '-') }}
