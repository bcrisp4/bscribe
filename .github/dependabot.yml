version: 2
updates:
  # Keep pinned action SHAs (and their # vX.Y.Z comments) current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    # Replaces the default `dependencies` label: action bumps don't change the
    # shipped artifact, so they skip the changelog (and must not activate the
    # dependabot-changelog workflow, which keys on `dependencies`).
    labels:
      - skip-changelog

  # Python dependencies via uv.lock.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
